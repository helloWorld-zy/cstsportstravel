# NATS Server Configuration
# Used by all microservices for async event communication

listen: 0.0.0.0:4222

# JetStream configuration for persistent message streams
jetstream {
  store_dir: "./data/jetstream"
  max_mem: 1G
  max_file: 10G
}

# Clustering (for production multi-node setup)
# cluster {
#   name: "travel-booking"
#   listen: 0.0.0.0:6222
#   routes: [
#     nats://node1:6222
#     nats://node2:6222
#     nats://node3:6222
#   ]
# }

# Logging
log_file: "./logs/nats-server.log"
logtime: true
debug: false
trace: false

# Authorization (token-based for simplicity)
# authorization {
#   token: "travel-booking-nats-token"
# }

# Max payload
max_payload: 1048576  # 1MB

# Client connection limits
max_connections: 1000
max_control_line: 512

# Ping/pong keepalive
ping_interval: 120
max_pings_out: 2
