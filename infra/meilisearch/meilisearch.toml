# Meilisearch Configuration
# Used for product search with facet filtering

# Listen address
http_addr = "0.0.0.0:7700"

# Master key (REQUIRED for production - set via environment variable)
# env: MEILI_MASTER_KEY
# master_key = "your-master-key-here"

# Database path
db_path = "./data/meilisearch"

# Log level
log_level = "INFO"

# Max indexing memory (256MB default)
max_indexing_memory = 268435456

# Max indexing threads
max_indexing_threads = 4

# Payload size limit (10MB for product documents)
http_payload_size_limit = 10485760

# CORS (allow frontend access)
cors_origins = ["*"]

# Dump directory
dump_dir = "./dumps"

# Snapshot configuration
schedule_snapshot = false
snapshot_dir = "./snapshots"
