openapi: 3.0.3
info:
  title: Order API
  description: Order creation, management, and refund APIs for the domestic group tour MVP.
  version: 1.0.0

servers:
  - url: https://localhost:8443/api/v1
    description: Local development

tags:
  - name: orders
    description: Order management endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
        trace_id:
          type: string
          format: uuid

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        order_no:
          type: string
          example: ORD-20260619-143022-0001
        order_status:
          type: string
          enum: [pending_pay, paid_full, pending_travel, in_travel, completed, cancelled, refunding, refunded, closed]
        payment_status:
          type: string
          enum: [unpaid, partial, paid, refunded]
        product:
          type: object
          properties:
            id:
              type: integer
            product_name:
              type: string
            cover_image:
              type: string
            days:
              type: integer
            nights:
              type: integer
        departure:
          type: object
          properties:
            departure_date:
              type: string
              format: date
            return_date:
              type: string
              format: date
        adult_count:
          type: integer
        child_count:
          type: integer
        infant_count:
          type: integer
        total_amount:
          type: number
          description: Total amount in yuan
          example: 7998.00
        discount_amount:
          type: number
          example: 0
        payable_amount:
          type: number
          example: 7998.00
        single_supplement_amount:
          type: number
          example: 800.00
        addon_amount:
          type: number
          example: 0
        contact_name:
          type: string
        contact_phone:
          type: string
          description: Masked phone
        travellers:
          type: array
          items:
            $ref: '#/components/schemas/OrderTraveller'
        cancellation_rules:
          type: array
          items:
            $ref: '#/components/schemas/CancellationRule'
        created_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
          nullable: true
        expire_at:
          type: string
          format: date-time
          description: Payment expiration time (30min after creation)

    OrderTraveller:
      type: object
      properties:
        id:
          type: integer
        real_name:
          type: string
          description: Masked name
        id_card_no:
          type: string
          description: Masked ID card
        phone:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
        is_child:
          type: boolean
        is_infant:
          type: boolean
        linked_adult_id:
          type: integer
          nullable: true

    CancellationRule:
      type: object
      properties:
        days_before_min:
          type: integer
        days_before_max:
          type: integer
          nullable: true
        refund_percentage:
          type: number
        description:
          type: string

    OrderStatusLog:
      type: object
      properties:
        from_status:
          type: string
        to_status:
          type: string
        operator_type:
          type: string
        reason:
          type: string
        created_at:
          type: string
          format: date-time

    PaginatedOrders:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

paths:
  /orders:
    post:
      tags: [orders]
      summary: Create order
      description: >
        Creates a new booking order. Locks inventory for 30 minutes. Starts payment countdown.
        Requires user to be real-name verified. Validates ID card format for all travellers.
        Automatically adds single room supplement when adult count is odd.
        Children must be linked to an adult traveller. Infants limited to 1 per adult.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, departure_id, adult_count, travellers, contact_name, contact_phone]
              properties:
                product_id:
                  type: integer
                  format: int64
                departure_id:
                  type: integer
                  format: int64
                adult_count:
                  type: integer
                  minimum: 1
                child_count:
                  type: integer
                  minimum: 0
                  default: 0
                infant_count:
                  type: integer
                  minimum: 0
                  default: 0
                travellers:
                  type: array
                  description: >
                    Traveller list. Total count must equal adult_count + child_count + infant_count.
                    Children (is_child=true) must have linked_adult_traveller_index set.
                  items:
                    type: object
                    required: [real_name, id_card_no]
                    properties:
                      real_name:
                        type: string
                      id_card_no:
                        type: string
                        description: 18-digit ID card with check digit validation
                      phone:
                        type: string
                      birth_date:
                        type: string
                        format: date
                      gender:
                        type: string
                        enum: [male, female]
                      is_child:
                        type: boolean
                        default: false
                      is_infant:
                        type: boolean
                        default: false
                      linked_adult_traveller_index:
                        type: integer
                        description: Index of the linked adult in the travellers array (for children/infants)
                addons:
                  type: array
                  description: Optional addon services
                  items:
                    type: object
                    properties:
                      addon_id:
                        type: integer
                      quantity:
                        type: integer
                        default: 1
                contact_name:
                  type: string
                contact_phone:
                  type: string
                remark:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order_id:
                            type: integer
                          order_no:
                            type: string
                          total_amount:
                            type: number
                          discount_amount:
                            type: number
                          payable_amount:
                            type: number
                          single_supplement_amount:
                            type: number
                          fee_breakdown:
                            type: object
                            description: Detailed price breakdown
                          expire_at:
                            type: string
                            format: date-time
                            description: Payment deadline (30min from now)
        '400':
          description: Validation error (insufficient stock, invalid ID card, traveller constraint violation)
        '409':
          description: Departure sold out or stock insufficient

    get:
      tags: [orders]
      summary: List user orders
      description: Returns paginated order list for the authenticated user with optional status filter.
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending_pay, paid_full, pending_travel, in_travel, completed, cancelled, refunding, refunded]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedOrders'

  /orders/{id}:
    get:
      tags: [orders]
      summary: Get order detail
      description: Returns complete order information including product, travellers, fees, payment records, and cancellation rules.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Order'
                          - type: object
                            properties:
                              payment_records:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    payment_no:
                                      type: string
                                    channel:
                                      type: string
                                    amount:
                                      type: number
                                    status:
                                      type: string
                                    paid_at:
                                      type: string
                                      format: date-time
                              status_log:
                                type: array
                                items:
                                  $ref: '#/components/schemas/OrderStatusLog'
        '404':
          description: Order not found or does not belong to user

  /orders/{id}/cancel:
    post:
      tags: [orders]
      summary: Cancel order
      description: Cancel a pending_pay order. Only allowed for orders in pending_pay status.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Cancellation reason
                  example: 行程变更
      responses:
        '200':
          description: Order cancelled
        '400':
          description: Order cannot be cancelled (wrong status)

  /orders/{id}/refund:
    post:
      tags: [orders]
      summary: Submit refund request
      description: >
        Submit a refund request for a paid order. The system automatically calculates the
        refundable amount based on the product's cancellation rules and days remaining before departure.
        Only allowed for orders in paid_full or pending_travel status.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Refund reason category
                  enum: [行程变更, 健康原因, 不可抗力, 其他]
                description:
                  type: string
                  description: Detailed explanation
                  maxLength: 500
      responses:
        '200':
          description: Refund request submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          refund_id:
                            type: integer
                          refund_amount:
                            type: number
                            description: Calculated refund amount in yuan
                          refund_percentage:
                            type: number
                            description: Applied refund percentage
                          matching_rule:
                            type: string
                            description: Cancellation rule applied
                          status:
                            type: string
                            example: pending
        '400':
          description: Order not eligible for refund (wrong status or already refunded)

  /orders/{id}/confirm:
    post:
      tags: [orders]
      summary: Confirm travel completion
      description: User confirms that the trip is completed. Transitions order from in_travel to completed.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Travel confirmed complete
        '400':
          description: Order not in confirmable status
