openapi: 3.0.3
info:
  title: Payment API
  description: Payment creation, callback handling, and status query APIs for the domestic group tour MVP.
  version: 1.0.0

servers:
  - url: https://localhost:8443/api/v1
    description: Local development

tags:
  - name: payments
    description: Payment endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
        trace_id:
          type: string
          format: uuid

    Payment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        payment_no:
          type: string
          example: PAY-20260619-143022-0001
        order_id:
          type: integer
        channel:
          type: string
          enum: [alipay, wechat, unionpay]
        method:
          type: string
          enum: [native, jsapi, h5, wap, miniapp]
        amount:
          type: number
          description: Amount in yuan
          example: 7998.00
        status:
          type: string
          enum: [created, paying, paid, failed, closed, refunded]
        channel_trade_no:
          type: string
          description: Payment channel transaction number
        paid_at:
          type: string
          format: date-time
          nullable: true
        expire_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

paths:
  /payments/create:
    post:
      tags: [payments]
      summary: Create payment order
      description: >
        Creates a payment order for a pending order. Returns payment parameters
        for the frontend to initiate the payment flow (e.g., Alipay pay URL,
        WeChat Pay prepay parameters).

        Payment expires after 30 minutes (matching the order payment deadline).
        Only one active payment per order per channel is allowed.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, channel]
              properties:
                order_id:
                  type: integer
                  format: int64
                  description: Order to pay for
                channel:
                  type: string
                  enum: [alipay, wechat]
                  description: Payment channel
                method:
                  type: string
                  enum: [native, jsapi, h5, wap, miniapp]
                  description: >
                    Payment method. Auto-selected based on channel and client context if not specified.
                    - alipay: h5 (mobile web), wap (PC web)
                    - wechat: native (QR code), jsapi (in-browser), miniapp (mini program)
                  default: auto
      responses:
        '200':
          description: Payment order created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          payment_id:
                            type: integer
                          payment_no:
                            type: string
                          channel:
                            type: string
                          method:
                            type: string
                          amount:
                            type: number
                          expire_at:
                            type: string
                            format: date-time
                          pay_params:
                            type: object
                            description: >
                              Channel-specific payment parameters.
                              Alipay h5: {pay_url: "..."} - redirect user to this URL.
                              WeChat native: {code_url: "weixin://..."} - display as QR code.
                              WeChat jsapi: {prepay_id, nonce_str, timestamp, sign} - call WeixinJSBridge.
                              WeChat miniapp: {prepay_id, nonce_str, timestamp, sign} - call wx.requestPayment.
        '400':
          description: Order not in pending_pay status or already has active payment
        '404':
          description: Order not found

  /payments/{id}/status:
    get:
      tags: [payments]
      summary: Query payment status
      description: Returns the current payment status. Used by frontend to poll payment result.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Payment'

  /payments/notify/alipay:
    post:
      tags: [payments]
      summary: Alipay payment callback
      description: >
        Receives asynchronous payment notification from Alipay. The system verifies
        the Alipay signature, processes the payment idempotently (duplicate callbacks
        are safely ignored), and updates the order status.

        This endpoint is called by Alipay servers, not by the frontend.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              description: Alipay notification parameters (sign, sign_type, out_trade_no, trade_no, trade_status, total_amount, etc.)
      responses:
        '200':
          description: >
            Returns "success" string (not JSON) to acknowledge receipt.
            Alipay will retry if it does not receive this response.
          content:
            text/plain:
              schema:
                type: string
                example: success

  /payments/notify/wechat:
    post:
      tags: [payments]
      summary: WeChat Pay payment callback
      description: >
        Receives asynchronous payment notification from WeChat Pay. The system verifies
        the signature, processes the payment idempotently, and updates the order status.

        This endpoint is called by WeChat Pay servers, not by the frontend.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
              description: WeChat Pay notification XML
      responses:
        '200':
          description: Returns XML acknowledgment
          content:
            application/xml:
              schema:
                type: string
                example: "<xml><return_code><![CDATA[SUCCESS]]></return_code><return_msg><![CDATA[OK]]></return_msg></xml>"

  /payments/{id}/query:
    post:
      tags: [payments]
      summary: Active payment status query (fallback)
      description: >
        Actively queries the payment channel for transaction status. Used as a fallback
        when the asynchronous callback is delayed or lost. The system calls the payment
        channel's query API and updates the local payment record.

        Should be called when: payment creation > 1 minute ago AND status is still 'created' or 'paying'.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Payment'
        '404':
          description: Payment not found

  /test/payments/simulate-callback:
    post:
      tags: [payments]
      summary: Simulate payment callback (test mode only)
      description: >
        Test-only endpoint to simulate a payment channel callback. Only available
        when app.env=test. Used for integration testing without actual payment channels.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, status]
              properties:
                payment_id:
                  type: integer
                status:
                  type: string
                  enum: [paid, failed]
                  description: Simulated payment result
                channel_trade_no:
                  type: string
                  description: Simulated channel transaction number
                  default: "TEST_TRADE_001"
      responses:
        '200':
          description: Callback simulated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
